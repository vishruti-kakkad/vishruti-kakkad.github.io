<!-- Project modal -->
<div class="modal" id="modal" aria-hidden="true">
  <div class="backdrop"></div>
  <div class="panel">
    <div class="head">
      <div>
        <b id="mTitle">PROJECT</b>
        <div class="dim" id="mSub"></div>
      </div>
      <div class="x" id="mClose">CLOSE</div>
    </div>
    <div class="body" id="mBody">
      <!-- injected -->
    </div>
  </div>
</div>

</main>

<script src="assets/data.js"></script>
<script src="assets/app.js"></script>

<script>
(function(){
  const DATA = window.VK_DATA;
  const list = document.getElementById('plist');
  const modal = document.getElementById('modal');
  const mTitle = document.getElementById('mTitle');
  const mSub = document.getElementById('mSub');
  const mBody = document.getElementById('mBody');
  const close = document.getElementById('mClose');

  function esc(s){ return (s||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  function openModal(p){
    mTitle.textContent = p.title;
    mSub.textContent = `${p.subtitle} • ${p.type} • ${p.field}`;
    mBody.innerHTML = `
      <div class="modal-content">
        <h3>Overview</h3>
        <ul class="bullets">
          ${p.bullets.map(b=>`<li>${esc(b)}</li>`).join("")}
        </ul>
        
        <h3>Tags</h3>
        <div class="chips">
          ${(p.tags||[]).slice(0,12).map(t=>`<span class="chip">${esc(t)}</span>`).join("") || `<span class="chip"><i>none</i></span>`}
        </div>
      </div>
    `;
    modal.classList.add('open');
    modal.setAttribute('aria-hidden','false');
  }

  function closeModal(){
    modal.classList.remove('open');
    modal.setAttribute('aria-hidden','true');
  }
  close.addEventListener('click', closeModal);
  modal.addEventListener('click', (e)=>{ if(e.target === modal) closeModal(); });
  window.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeModal(); });

  function render(){
    list.innerHTML = "";
    const items = DATA.projects;
    items.forEach(p=>{
      const el = document.createElement('div');
      el.className = "card";
      el.setAttribute("role","button");
      el.setAttribute("data-category", p.category);
      el.tabIndex = 0;
      el.innerHTML = `
        <div class="card-title">${esc(p.title)}</div>
        <div class="card-meta">${esc(p.type)} • ${esc(p.field)}</div>
        <div class="card-subtitle">${esc(p.subtitle)}</div>
        <div class="card-arrow">→</div>
      `;
      el.addEventListener('click', ()=> openModal(p));
      el.addEventListener('keydown', (e)=>{ if(e.key==='Enter') openModal(p); });
      list.appendChild(el);
    });
  }

  render();

  // open selected project
  const params = new URLSearchParams(window.location.search);
  const pid = params.get('p') || (function(){ try{return sessionStorage.getItem('vk_selected_project')}catch(e){return null} })();
  if(pid){
    const p = DATA.projects.find(x=>x.id===pid);
    if(p){
      openModal(p);
      // clear session key for cleanliness
      try{ sessionStorage.removeItem('vk_selected_project'); }catch(e){}
    }
  }
})();
</script>
</body>
