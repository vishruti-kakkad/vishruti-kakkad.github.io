<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="tl" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#d4bdff" stop-opacity="0.72"/>
      <stop offset="55%" stop-color="#b79aff" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#9d6dff" stop-opacity="0.10"/>
    </radialGradient>
    <linearGradient id="ts" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#a8c8a0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8fb088" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="bl" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <g filter="url(#bl)" opacity="0.88">
    <!-- Left petal -->
    <path d="M 95 140 Q 74 108 82 68 Q 96 24 124 18 Q 142 52 136 100 Q 130 135 116 148 Z"
          fill="url(#tl)"/>
    <!-- Middle petal -->
    <path d="M 116 148 Q 114 110 128 78 Q 145 40 168 38 Q 178 82 166 128 Q 150 154 128 156 Z"
          fill="url(#tl)"/>
    <!-- Right petal -->
    <path d="M 128 156 Q 140 124 162 100 Q 186 78 200 102 Q 192 145 172 172 Q 150 182 134 170 Z"
          fill="url(#tl)"/>
    <!-- Stem -->
    <path d="M 138 162 L 135 370" stroke="url(#ts)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Leaf -->
    <path d="M 132 240 Q 100 258 76 308 Q 92 290 128 278 Q 138 268 135 248 Z"
          fill="url(#ts)" opacity="0.58"/>
  </g>
</svg>
