<script>
(function(){
  const S = (window.VK_DATA && window.VK_DATA.skills) ? window.VK_DATA.skills : {};
  const container = document.getElementById('skillsSections');

  function explode(item){
    const s = (item||"").trim();
    const m = s.match(/^([^:]{2,24}):\s*(.+)$/);
    if(!m) return [s];
    return m[2].split(",").map(x=>x.trim()).filter(Boolean);
  }

  // Render all categories with chips
  Object.keys(S).forEach((category) => {
    const raw = S[category] || "";
    const chips = raw.split("•").map(x=>x.trim()).filter(Boolean).flatMap(explode);
    
    const section = document.createElement('div');
    section.className = 'section';
    
    const h2 = document.createElement('h2');
    h2.textContent = category;
    section.appendChild(h2);
    
    const chipsDiv = document.createElement('div');
    chipsDiv.className = 'chips';
    
    chips.forEach(c => {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.textContent = c;
      chipsDiv.appendChild(chip);
    });
    
    section.appendChild(chipsDiv);
    container.appendChild(section);
  });
})();
</script>
